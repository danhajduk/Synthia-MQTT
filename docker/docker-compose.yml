services:
  mosquitto:
    image: eclipse-mosquitto:2
    profiles: ["embedded"]
    container_name: synthia-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - "1883:1883"
    networks:
      - synthia_mqtt

  mqtt-addon:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      - mosquitto
    working_dir: /workspace
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_CLIENT_ID: synthia-addon-mqtt
      MQTT_BASE_TOPIC: synthia
      MQTT_QOS: "1"
      MQTT_TLS: "false"
    command:
      [
        "bash",
        "-lc",
        "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8080",
      ]
    volumes:
      - ..:/workspace
      - ../runtime:/workspace/runtime
      # Required for automatic broker restart via POST /api/broker/restart.
      # If omitted, the API returns an operator_action command instead.
      # - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18080:8080"
    networks:
      - synthia_mqtt

networks:
  synthia_mqtt:
    driver: bridge
