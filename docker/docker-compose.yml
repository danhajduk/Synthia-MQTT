services:
  mqtt-addon:
    image: python:3.12-slim
    container_name: Synthia-MQTT
    restart: unless-stopped
    working_dir: /workspace
    environment:
      MQTT_HOST: ${MQTT_HOST:-10.0.0.100}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID:-synthia-addon-mqtt}
      MQTT_BASE_TOPIC: ${MQTT_BASE_TOPIC:-synthia}
      MQTT_QOS: ${MQTT_QOS:-1}
      MQTT_TLS: ${MQTT_TLS:-false}
      MQTT_USERNAME: ${MQTT_USERNAME:-}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
    command:
      [
        "bash",
        "-lc",
        "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8080",
      ]
    volumes:
      - ..:/workspace
      - ../runtime:/workspace/runtime
    ports:
      - "18080:8080"
